name: PhotoSwipeDelete
options:
  bundleIdPrefix: com.danila.photoswipedelete
  deploymentTarget:
    iOS: "17.0"
targets:
  PhotoSwipeDelete:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - Info.plist
    info:
      path: Sources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danila.photoswipedelete
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: "YES"
